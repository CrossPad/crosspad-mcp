name: Publish to npm

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    # A manual dispatch must not be able to mint the OIDC publish token from an
    # arbitrary ref. Restrict workflow_dispatch to master; releases are always
    # cut from a tag, so the release path is unrestricted.
    if: >-
      github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/master')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # NOTE: do NOT set registry-url here — setup-node would write an .npmrc
      # with `_authToken=${NODE_AUTH_TOKEN}` (a dummy placeholder), and npm would
      # use that bogus token instead of performing the OIDC exchange.
      - uses: actions/setup-node@v6
        with:
          node-version: 20

      # npm Trusted Publishing (OIDC) needs npm >= 11.5.1; node 20 ships npm 10.x.
      - run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build
      # No token: npm exchanges the GitHub OIDC id-token for a short-lived
      # publish credential via the package's configured Trusted Publisher.
      # Provenance is attached automatically under OIDC.
      - run: npm publish --access public
